name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Check if Claude should respond
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          SHOULD_RUN=false

          if [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            if [[ "$COMMENT_BODY" == *"@claude"* ]] || [[ "$PR_HEAD_REF" == claude/* ]]; then
              SHOULD_RUN=true
            fi

          elif [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            if [[ "$REVIEW_BODY" == *"@claude"* ]] || [[ "$PR_HEAD_REF" == claude/* ]]; then
              SHOULD_RUN=true
            fi

          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            if [[ "$COMMENT_BODY" == *"@claude"* ]]; then
              SHOULD_RUN=true
            else
              # Check if the comment is on a Claude-created PR
              BRANCH=$(gh api "repos/$REPO/pulls/$ISSUE_NUMBER" --jq '.head.ref' 2>/dev/null || echo "")
              if [[ "$BRANCH" == claude/* ]]; then
                SHOULD_RUN=true
              fi
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

      - name: Checkout repository
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        if: steps.check.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          prompt: |
            After completing your changes, create a pull request using the gh CLI:
            gh pr create --title "<title>" --body "<description>" --base main
            Make sure to push your branch first before creating the PR.
